<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8f3">
  <meta name="robots" content="noindex, nofollow">
  <title>電郵驗證 · BabyBud</title>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #fff5ee;
      --bg-bottom: #fdeee4;
      --card: #ffffff;
      --text: #3d2c29;
      --muted: #8a736c;
      --accent: #e8876b;
      --accent-hover: #df7860;
      --success: #4f9b72;
      --success-bg: #edf7f1;
      --error: #c45c4a;
      --error-bg: #fdf0ed;
      --border: rgba(61, 44, 41, 0.07);
      --shadow: 0 16px 48px rgba(61, 44, 41, 0.07);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC",
        "Helvetica Neue", sans-serif;
      background: linear-gradient(165deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding: max(24px, env(safe-area-inset-top))
               max(20px, env(safe-area-inset-right))
               max(24px, env(safe-area-inset-bottom))
               max(20px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: min(400px, 100%);
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 28px 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fffcfa 0%, #ffffff 100%);
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 12px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(61, 44, 41, 0.12);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .brand-title {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-sub {
      margin: 4px 0 0;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .card-body {
      padding: 28px 24px 32px;
      text-align: center;
    }

    .state-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    .state-icon svg {
      width: 28px;
      height: 28px;
      display: block;
    }

    .state-icon--loading {
      background: #f7f0eb;
    }

    .state-icon--success {
      background: var(--success-bg);
      color: var(--success);
    }

    .state-icon--error {
      background: var(--error-bg);
      color: var(--error);
    }

    .spinner {
      width: 26px;
      height: 26px;
      border: 2.5px solid #ead9cf;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.375rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .message {
      margin: 0 auto 24px;
      max-width: 30em;
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 280px;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.99); }

    .hint {
      margin: 18px 0 0;
      font-size: 0.8125rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .panel { display: block; }
    .panel[hidden] { display: none !important; }

    .noscript-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #faf6f3;
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.55;
      text-align: left;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      font-size: 0.75rem;
      color: #b09a92;
    }
  </style>
</head>
<body>
  <div class="page">
    <article class="card" role="main">
      <header class="card-header">
        <div class="logo-wrap">
          <img src="app-icon.png" width="72" height="72" alt="BabyBud">
        </div>
        <p class="brand-title">BabyBud</p>
        <p class="brand-sub">豆豆 · 育兒陪伴</p>
      </header>

      <div class="card-body">
        <!-- Loading -->
        <section id="panel-loading" class="panel" aria-live="polite" aria-busy="true">
          <div class="state-icon state-icon--loading" aria-hidden="true">
            <span class="spinner"></span>
          </div>
          <h1>正在確認電郵</h1>
          <p class="message">請稍候，我們正在為你完成帳號驗證。</p>
        </section>

        <!-- Success -->
        <section id="panel-success" class="panel" hidden aria-live="polite">
          <div class="state-icon state-icon--success" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12.5 9.5 17 19 7"/>
            </svg>
          </div>
          <h1>電郵已確認</h1>
          <p class="message">你的 BabyBud 帳號已成功建立，現在可以返回 app 開始使用。</p>
          <a class="btn" id="btn-open-app" href="babybud://auth-callback">打開 BabyBud</a>
          <p class="hint">如果沒有自動開啟 app，請返回 BabyBud 手動登入。</p>
        </section>

        <!-- Error -->
        <section id="panel-error" class="panel" hidden aria-live="assertive">
          <div class="state-icon state-icon--error" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 8v5M12 16h.01"/>
            </svg>
          </div>
          <h1>無法完成驗證</h1>
          <p class="message" id="error-message">此連結可能已失效或已被使用，請重新註冊或於 App 內登入後重試。</p>
          <a class="btn" id="btn-open-app-error" href="babybud://auth-callback">返回 BabyBud</a>
          <p class="hint">打開 App 後，可使用「登入」或「忘記密碼」繼續。</p>
        </section>

        <noscript>
          <div class="noscript-box">
            <strong>電郵已確認</strong><br>
            你的帳號應已完成驗證。請手動打開 BabyBud App 並登入。
          </div>
        </noscript>
      </div>
    </article>
    <p class="footer-note">© BabyBud</p>
  </div>

  <script>
    (function () {
      var APP_SCHEME = "babybud://auth-callback";
      var OPEN_DELAY_MS = 1300;

      var suffix = window.location.search + window.location.hash;
      var deepLink = APP_SCHEME + suffix;

      var query = new URLSearchParams(window.location.search);
      var hashPart = window.location.hash.replace(/^#/, "");
      var hashQuery = new URLSearchParams(hashPart);

      function getParam(name) {
        return query.get(name) || hashQuery.get(name);
      }

      function decodeText(value) {
        if (!value) return "";
        try {
          return decodeURIComponent(value.replace(/\+/g, " "));
        } catch (e) {
          return value;
        }
      }

      function showPanel(id) {
        ["panel-loading", "panel-success", "panel-error"].forEach(function (panelId) {
          var el = document.getElementById(panelId);
          var active = panelId === id;
          el.hidden = !active;
          if (active && panelId === "panel-loading") {
            el.setAttribute("aria-busy", "true");
          } else {
            el.removeAttribute("aria-busy");
          }
        });
      }

      var btnSuccess = document.getElementById("btn-open-app");
      var btnError = document.getElementById("btn-open-app-error");
      btnSuccess.href = deepLink;
      btnError.href = deepLink;

      var authError = getParam("error");
      var errorDescription = decodeText(getParam("error_description"));
      var hasAuthPayload = !!(getParam("code") || getParam("access_token"));

      if (authError) {
        showPanel("panel-error");
        document.getElementById("error-message").textContent =
          errorDescription || "此連結可能已失效或已被使用，請重新註冊或於 App 內登入後重試。";
        return;
      }

      // Always show success UI first — never navigate away before render.
      showPanel("panel-success");

      function tryOpenApp() {
        // Use assign (not replace) so the success page stays in history if app does not open.
        window.location.href = deepLink;
      }

      if (hasAuthPayload) {
        setTimeout(tryOpenApp, OPEN_DELAY_MS);
      }

      btnSuccess.addEventListener("click", function (event) {
        event.preventDefault();
        tryOpenApp();
      });
    })();
  </script>
</body>
</html>
